<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Is Mt. Rainier visible right now? Check the current visibility status from the Space Needle webcam.">
  <title>Is Mt. Rainier Out? | Tahoma Tracker</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/home.css">
</head>
<body>
  <main class="container">
    <!-- Status Section -->
    <section class="status-section" aria-label="Current visibility status">
      <div class="status-header">
        <h1 class="page-title"><span id="page-title-tense">Is</span> the Mountain Out?</h1>
        <div id="status-display" class="status-value">
          <div class="status-value__loading">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Image and Metadata Section -->
    <section class="content-section">
      <div class="content-wrapper">
        <div class="image-section" aria-label="Latest webcam image">
          <div id="image-viewer" class="image-viewer">
            <div class="image-viewer__loading">
              <div class="spinner"></div>
            </div>
          </div>
        </div>

        <div class="metadata-section" aria-label="Analysis details">
          <div id="metadata-display" class="metadata">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </section>

    <!-- Timeline Section -->
    <section class="timeline-section" aria-label="View historical images">
      <div class="timeline-compact">
        <div class="timeline-main">
          <div class="timeline-captured" id="timeline-captured">
            <span class="metadata__label">Captured</span>
            <span class="metadata__value" id="timeline-captured-value">--</span>
          </div>
          <div class="timeline-row">
            <div class="timeline-scrubber-compact">
              <div id="timeline-scrubber-track" class="timeline-scrubber-track">
                <div id="timeline-scrubber-progress" class="timeline-scrubber-progress"></div>
                <div id="timeline-scrubber-handle" class="timeline-scrubber-handle"></div>
              </div>
            </div>
            <button class="timeline-expand-btn" id="timeline-expand-btn" aria-label="Expand timeline controls">▼</button>
          </div>
        </div>
        
        <div class="timeline-controls-expanded" id="timeline-controls-expanded" style="display: none;">
          <div class="timeline-controls">
            <div class="timeline-control-left">
              <button id="timeline-prev-day" class="timeline-nav-btn" aria-label="Previous day">←</button>
              <div id="timeline-date-display" class="timeline-date">Today</div>
              <button id="timeline-next-day" class="timeline-nav-btn" aria-label="Next day">→</button>
              <button id="timeline-latest-btn" class="timeline-latest-btn" aria-label="Jump to latest">Jump to Latest</button>
            </div>
            <div class="timeline-control-right">
              <button id="timeline-play-btn" class="timeline-play-btn" aria-label="Play/Pause">▶ Play</button>
            </div>
          </div>
          <div id="timeline-time-display" class="timeline-time">--</div>
        </div>
      </div>
    </section>

    <!-- Label Correction Section (Crowdsource) -->
    <section class="correction-section" aria-label="Submit a correction">
      <details class="correction-details">
        <summary class="correction-summary">Think this is wrong? Submit a correction</summary>
        <div id="label-form-container" class="correction-form">
          <!-- Populated by JS -->
        </div>
      </details>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p class="footer__text">
        <a href="/history.html" class="footer__link">View History</a> •
        Data from <a href="https://www.spaceneedle.com/webcam/" target="_blank" rel="noopener">Space Needle Panocam</a>
      </p>
      <p class="footer__text footer__text--small">
        Last updated: <span id="last-updated">--</span>
      </p>
    </footer>
  </main>

  <!-- JavaScript -->
  <script type="module" src="/js/main.js"></script>
</body>
</html>
