<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Is Mt. Rainier visible right now? Check the current visibility status from the Space Needle webcam.">
  <title>Is Mt. Rainier Out? | Tahoma Tracker</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/home.css">
</head>
<body>
  <main class="container">
    <!-- Status Section -->
    <section class="status-section" aria-label="Current visibility status">
      <div class="status-strip">
        <div class="status-strip__banners">
          <div class="status-strip__banner status-strip__banner--primary">MT. RAINIER</div>
          <div class="status-strip__banner status-strip__banner--secondary">TAHOMA</div>
        </div>
        <div class="status-strip__mountain">
          <svg viewBox="0 0 1200 100" xmlns="http://www.w3.org/2000/svg" class="mountain-svg" preserveAspectRatio="none">
            <path d="M0,100 L100,60 L200,75 L300,40 L400,65 L500,30 L600,55 L700,45 L800,60 L900,35 L1000,50 L1100,40 L1200,100 Z" fill="currentColor" opacity="0.12"/>
            <path d="M0,100 L150,70 L250,80 L350,50 L450,70 L550,45 L650,65 L750,55 L850,70 L950,50 L1050,60 L1150,55 L1200,100 Z" fill="currentColor" opacity="0.08"/>
          </svg>
        </div>
        <div class="status-strip__content">
          <div class="status-strip__question">
            <span id="page-title-tense">Is</span> the Mountain Out?
          </div>
          <div id="status-display" class="status-strip__status">
            <div class="status-value__loading">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Image and Metadata Section -->
    <section class="content-section">
      <div class="content-wrapper">
        <div class="image-section" aria-label="Latest webcam image">
          <div id="image-viewer" class="image-viewer">
            <div class="image-viewer__loading">
              <div class="spinner"></div>
            </div>
          </div>
        </div>

        <div class="metadata-section" aria-label="Analysis details">
          <div id="metadata-display" class="metadata">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </section>

    <!-- Timeline Section -->
    <section class="timeline-section" aria-label="View historical images">
      <div class="timeline-compact">
        <div class="timeline-main">
          <div class="timeline-captured" id="timeline-captured">
            <span class="metadata__label">Captured</span>
            <span class="metadata__value" id="timeline-captured-value">--</span>
          </div>
          <div class="timeline-row">
            <div class="timeline-scrubber-compact">
              <div id="timeline-scrubber-track" class="timeline-scrubber-track">
                <div id="timeline-scrubber-progress" class="timeline-scrubber-progress"></div>
                <div id="timeline-scrubber-handle" class="timeline-scrubber-handle"></div>
              </div>
            </div>
            <button class="timeline-expand-btn" id="timeline-expand-btn" aria-label="Expand timeline controls">▼</button>
          </div>
        </div>
        
        <div class="timeline-controls-expanded" id="timeline-controls-expanded" style="display: none;">
          <div class="timeline-controls">
            <div class="timeline-control-left">
              <div id="timeline-calendar-container" class="timeline-calendar-wrapper"></div>
              <button id="timeline-latest-btn" class="timeline-latest-btn" aria-label="Jump to latest">Jump to Latest</button>
            </div>
            <div class="timeline-control-right">
              <button id="timeline-play-btn" class="timeline-play-btn" aria-label="Play/Pause">▶ Play</button>
            </div>
          </div>
          
          <!-- Day Statistics -->
          <div id="timeline-stats" class="timeline-stats" style="display: none;">
            <div class="timeline-stats__title">Today's Stats</div>
            <div class="timeline-stats__grid">
              <div class="timeline-stat">
                <div class="timeline-stat__value timeline-stat__value--out" id="timeline-stats-day-pct">--%</div>
                <div class="timeline-stat__label">Visible Today</div>
              </div>
              <div class="timeline-stat">
                <div class="timeline-stat__value" id="timeline-stats-month-days">--</div>
                <div class="timeline-stat__label">Days Out This Month</div>
              </div>
              <div class="timeline-stat" id="timeline-stats-best-day-container" style="display: none;">
                <div class="timeline-stat__value" id="timeline-stats-best-day">--</div>
                <div class="timeline-stat__label">Best Day This Month</div>
              </div>
              <div class="timeline-stat" id="timeline-stats-streak-container" style="display: none;">
                <div class="timeline-stat__value" id="timeline-stats-streak">--</div>
                <div class="timeline-stat__label">Longest Streak</div>
              </div>
            </div>
          </div>
          
          <div id="timeline-time-display" class="timeline-time">--</div>
        </div>
      </div>
    </section>

    <!-- Label Correction Section (Crowdsource) -->
    <section class="correction-section" aria-label="Submit a correction">
      <details class="correction-details">
        <summary class="correction-summary">Think this image analysis is wrong? Submit a correction</summary>
        <div id="label-form-container" class="correction-form">
          <!-- Populated by JS -->
        </div>
      </details>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p class="footer__text">
        Images sourced from <a href="https://www.spaceneedle.com/webcam/" target="_blank" rel="noopener">Space Needle Panocam</a>
      </p>
      <p class="footer__text footer__text--small">
        Last checked: <span id="last-checked">--</span>
      </p>
    </footer>
  </main>

  <!-- JavaScript -->
  <script type="module" src="/js/main.js"></script>
</body>
</html>
