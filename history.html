<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View historical Mt. Rainier visibility from the Space Needle webcam.">
  <title>History | Tahoma Tracker</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/home.css">
</head>
<body>
  <main class="container">
    <!-- Header -->
    <section class="status-section" aria-label="History viewer">
      <div class="status-header">
        <h1 class="page-title">History</h1>
        <a href="/" class="back-link">← Back to Current</a>
      </div>
    </section>

    <!-- Date Navigation -->
    <section class="content-section">
      <div class="date-navigation">
        <button id="prev-day-btn" class="nav-btn" aria-label="Previous day">←</button>
        <input type="date" id="date-picker" class="date-picker" />
        <button id="next-day-btn" class="nav-btn" aria-label="Next day">→</button>
      </div>

      <!-- Image Viewer -->
      <div class="content-wrapper">
        <div class="image-section" aria-label="Historical webcam image">
          <div id="history-viewer" class="image-viewer">
            <div class="image-viewer__loading">
              <div class="spinner"></div>
            </div>
          </div>
        </div>

        <!-- Scrubber -->
        <div class="scrubber-container">
          <div id="scrubber-track" class="scrubber-track">
            <div id="scrubber-progress" class="scrubber-progress"></div>
            <div id="scrubber-handle" class="scrubber-handle"></div>
          </div>
        </div>
        
        <!-- Frame Navigation -->
        <div class="frame-navigation">
          <button id="prev-frame-btn" class="nav-btn" aria-label="Previous image">←</button>
          <div id="frame-info" class="frame-info"></div>
          <button id="next-frame-btn" class="nav-btn" aria-label="Next image">→</button>
        </div>
        
        <!-- Playback Controls -->
        <div class="playback-controls">
          <button id="play-btn" class="play-btn" aria-label="Play/Pause">Play</button>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/js/history.js"></script>
</body>
</html>
