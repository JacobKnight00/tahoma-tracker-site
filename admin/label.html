<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Labeling | Tahoma Tracker</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/admin.css">
</head>
<body class="admin-page">
  <div class="admin-container">
    <!-- Header -->
    <header class="admin-header">
      <h1 class="admin-header__title">Rapid Labeling</h1>
      <div class="admin-header__controls">
        <a href="/" class="button button--ghost">Back to Home</a>
      </div>
    </header>

    <div class="admin-layout">
      <!-- Main Content -->
      <div class="admin-layout__main">
        <!-- Compact Filter Panel -->
        <div class="filter-panel">
          <div class="filter-panel__primary">
            <div class="filter-group filter-group--dates">
              <input type="date" id="start-date" class="input input--compact">
              <span class="filter-separator">to</span>
              <input type="date" id="end-date" class="input input--compact">
            </div>
            <button id="apply-filters" class="button button--primary">Apply</button>
          </div>
          
          <details class="filter-details">
            <summary class="filter-summary">Advanced Filters</summary>
            <div class="filter-panel__advanced">
              <div class="filter-group">
                <label>Confidence threshold: 
                  <span class="tooltip" title="Show images with AI confidence LESS than this threshold. When 'Good frames only' is checked, uses visibility confidence. Otherwise uses the lowest confidence between frame state and visibility predictions.">ℹ️</span>
                  <input type="range" id="confidence-threshold" min="50" max="100" value="80" class="input--range">
                  <span id="confidence-value">80</span>%
                </label>
              </div>
              
              <div class="filter-group">
                <label>Hide already labeled:
                  <span class="tooltip" title="Choose which labeled images to hide from the queue. 'Hide any labeled' will only show completely unlabeled images.">ℹ️</span>
                  <select id="exclude-labeled" class="input input--compact">
                    <option value="none">Show all images</option>
                    <option value="admin">Hide admin labeled</option>
                    <option value="crowd">Hide crowd labeled</option>
                    <option value="any">Hide any labeled</option>
                  </select>
                </label>
              </div>
              
              <div class="filter-group filter-group--checkboxes">
                <label><input type="checkbox" id="good-frames-only"> Good frames only</label>
                <label>
                  <input type="checkbox" id="disagreements-only"> Disagreements only
                  <span class="tooltip" title="Show only images where AI predictions disagree with existing manual labels (different frame state or visibility classifications).">ℹ️</span>
                </label>
              </div>
            </div>
          </details>
        </div>

        <!-- Image Display with Navigation -->
        <div class="image-section">
          <div id="admin-image-viewer" class="admin-image-viewer">
            <div class="admin-image-viewer__loading">
              <div class="spinner"></div>
              <p>Select date range and apply filters to start labeling</p>
            </div>
            
            <!-- Analysis Overlay -->
            <div class="analysis-overlay" id="analysis-overlay" style="display: none;">
              <div class="analysis-overlay__content">
                <div class="analysis-line" id="prediction-line"></div>
                <div class="analysis-line" id="manual-line"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Compact Image Context -->
        <div id="image-context" class="image-context image-context--compact">
          <div class="image-context__header">
            <div class="image-context__info">
              <span><strong>ID:</strong> <span id="image-id">--</span></span>
              <span><strong>Time:</strong> <span id="image-time">--</span></span>
            </div>
            <div class="progress-compact">
              <span id="progress-text">0 of 0 images</span>
              <div class="progress-bar progress-bar--small">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
              </div>
            </div>
          </div>
          
          <details class="context-details">
            <summary class="context-summary">Analysis & Labels</summary>
            <div class="context-content">
              <div class="image-context__section">
                <h4>AI Analysis:</h4>
                <div class="image-context__predictions" id="analysis-predictions"></div>
              </div>
              
              <div class="image-context__section">
                <h4>Manual Labels:</h4>
                <div class="image-context__predictions" id="human-labels"></div>
              </div>
              
              <div class="image-context__section" id="disagreement-section" style="display: none;">
                <h4>⚠️ Disagreement:</h4>
                <div class="image-context__predictions" id="disagreement-info"></div>
              </div>
            </div>
          </details>
        </div>
      </div>

      <!-- Compact Controls Sidebar -->
      <div class="admin-layout__controls">
        <!-- Frame State Controls -->
        <div class="control-group control-group--compact">
          <h3>Frame State</h3>
          <div class="button-grid--compact">
            <button data-action="label-frame" data-value="good" class="button button--control">
              <kbd>G</kbd> <span class="mobile-text">Good</span>
            </button>
            <button data-action="label-frame" data-value="off_target" class="button button--control">
              <kbd>F</kbd> <span class="mobile-text">Off Target</span>
            </button>
            <button data-action="label-frame" data-value="dark" class="button button--control">
              <kbd>D</kbd> <span class="mobile-text">Dark</span>
            </button>
            <button data-action="label-frame" data-value="bad" class="button button--control">
              <kbd>B</kbd> <span class="mobile-text">Bad</span>
            </button>
          </div>
        </div>

        <!-- Visibility Controls -->
        <div class="control-group control-group--compact">
          <h3>Visibility</h3>
          <div class="button-grid--compact">
            <button data-action="label-visibility" data-value="out" class="button button--control" disabled>
              <kbd>O</kbd> <span class="mobile-text">Out</span>
            </button>
            <button data-action="label-visibility" data-value="partial" class="button button--control" disabled>
              <kbd>P</kbd> <span class="mobile-text">Partial</span>
            </button>
            <button data-action="label-visibility" data-value="not_out" class="button button--control" disabled>
              <kbd>N</kbd> <span class="mobile-text">Not Out</span>
            </button>
          </div>
        </div>

        <!-- Navigation & Batch -->
        <div class="control-group control-group--compact">
          <h3>Actions</h3>
          <div class="button-grid--actions">
            <button data-action="submit-batch" class="button button--primary button--small" disabled>
              <span class="mobile-text">Submit (</span><span id="batch-count">0</span><span class="mobile-text">)</span>
            </button>
          </div>
          <div class="batch-status" id="batch-status">Batch: 0 pending (auto-submits at 10)</div>
        </div>
      </div>
    </div>
  </div>
